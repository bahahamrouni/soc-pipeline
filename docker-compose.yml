version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

networks:
  soc-net:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:
  redis-data:
  postgres-data:
  opensearch-data:
  ingestion-state:

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: soc-zookeeper
    hostname: zookeeper
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: soc-kafka
    hostname: kafka
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: soc-kafka-init
    networks:
      - soc-net
    depends_on:
      - kafka
    volumes:
      - ./init/kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    environment:
      KAFKA_BROKER: kafka:9092

  redis:
    image: redis:7-alpine
    container_name: soc-redis
    hostname: redis
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: soc-postgres
    hostname: postgres
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init/postgres/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    environment:
      POSTGRES_DB: socdb
      POSTGRES_USER: socadmin
      POSTGRES_PASSWORD: S0cAdmin!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socadmin -d socdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: soc-opensearch
    hostname: opensearch
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    ports:
      - "9201:9200"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: soc-ingestion
    hostname: ingestion
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    volumes:
      - /var/ossec/logs/alerts:/app/data:ro
      - ingestion-state:/app/state
    environment:
      KAFKA_BROKER: kafka:9092
      ALERTS_FILE: /app/data/alerts.json
      KAFKA_TOPIC: wazuh-alerts-raw
      POLL_INTERVAL: "2"
      LOG_LEVEL: DEBUG
      POSITION_FILE: /app/state/alerts.json.pos
    depends_on:
      - kafka

  processing:
    build:
      context: ./services/processing
      dockerfile: Dockerfile
    container_name: soc-processing
    hostname: processing
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_CONSUMER_TOPIC: wazuh-alerts-raw
      KAFKA_PRODUCER_TOPIC: alerts-enriched
      LOG_LEVEL: DEBUG
    depends_on:
      - kafka

  correlation:
    build:
      context: ./services/correlation
      dockerfile: Dockerfile
    container_name: soc-correlation
    hostname: correlation
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_CONSUMER_TOPIC: alerts-enriched
      KAFKA_PRODUCER_TOPIC: incidents
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "R3disSOC!"
      LOG_LEVEL: DEBUG
    depends_on:
      - kafka
      - redis

  ai-inference:
    build:
      context: ./services/ai-inference
      dockerfile: Dockerfile
    container_name: soc-ai-inference
    hostname: ai-inference
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_CONSUMER_TOPIC: incidents
      KAFKA_PRODUCER_TOPIC: ai-results
      LOG_LEVEL: INFO
    depends_on:
      - kafka

  storage:
    build:
      context: ./services/storage
      dockerfile: Dockerfile
    container_name: soc-storage
    hostname: storage
    <<: *default-restart
    logging: *default-logging
    networks:
      - soc-net
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_CONSUMER_TOPIC: ai-results
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: socdb
      POSTGRES_USER: socadmin
      POSTGRES_PASSWORD: S0cAdmin!
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      OPENSEARCH_INDEX: soc-incidents
      LOG_LEVEL: INFO
    depends_on:
      - kafka
      - postgres
      - opensearch
  dashboard:
      build:
        context: ./services/dashboard
        dockerfile: Dockerfile
      container_name: soc-dashboard
      hostname: dashboard
      restart: unless-stopped
      logging:
        driver: "json-file"
        options:
          max-size: "50m"
          max-file: "5"
      networks:
        - soc-net
      ports:
        - "8000:8000"
      environment:
        POSTGRES_HOST: postgres
        POSTGRES_PORT: "5432"
        POSTGRES_DB: socdb
        POSTGRES_USER: socadmin
        POSTGRES_PASSWORD: S0cAdmin!
      depends_on:
        - postgres
